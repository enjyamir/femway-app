<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FemWay - Home Screen</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="home.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="iphone-13">
        <div class="notch"></div>

        <header class="header fade-in">
            <div class="user-profile">
                <div class="avatar-placeholder"><i class="ph-fill ph-user"></i></div>
                <div class="welcome-text">
                    <span>Welcome back,</span>
                    <h2>Sarah Mohammed</h2>
                </div>
            </div>
            <button class="icon-btn"><i class="ph ph-bell"></i></button>
        </header>

        <div class="map-view fade-in">
            <img src="images/Screenshot 2026-03-31 at 3.40.59 PM.png" alt="Map" class="map-img">
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <span>Where to, Sarah?</span>
            </div>
        </div>

        <main class="main-content">
            <section class="section slide-up" style="--delay: 0.1s">
                <div class="section-title"><h3>Top Rated Drivers Near You</h3></div>
                <div class="horizontal-scroll">
                    <div class="driver-card">
                        <img src="https://api.dicebear.com/8.x/notionists/svg?seed=Elena" alt="Elena">
                        <div class="driver-details">
                            <h4>Madiha Hossam.</h4>
                            <div class="stars"><i class="ph-fill ph-star"></i> 4.9</div>
                        </div>
                    </div>
                    <div class="driver-card">
                        <img src="https://api.dicebear.com/8.x/notionists/svg?seed=Maya" alt="Maya">
                        <div class="driver-details">
                            <h4>Jana Abdelrahman.</h4>
                            <div class="stars"><i class="ph-fill ph-star"></i> 5.0</div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section slide-up" style="--delay: 0.2s">
                <div class="sketchfab-embed-wrapper"> 
                    <model-viewer 
                        src="3d/vw_t1_style_bus_free.glb" 
                        autoplay 
                        auto-rotate 
                        shadow-intensity="1" 
                        camera-controls 
                        touch-action="pan-y">
                    </model-viewer>
                </div>
            </section>

            <section class="section slide-up" style="--delay: 0.3s">
                <div class="section-title"><h3>Choose Service</h3></div>
                <div class="package-grid">
                    <div class="package-card active">
                        <div class="icon-wrapper"><i class="ph ph-bus iconz"></i></div>
                        <span>Eco Ride</span>
                    </div>
                    <a href="moto_ship.html" class="package-card" style="text-decoration: none;">
                        <div class="icon-wrapper"><i class="ph ph-motorcycle iconz"></i></div>
                        <span>Moto-Shipping</span>
                    </a>
                    <div class="package-card">
                        <div class="icon-wrapper"><i class="ph ph-crown iconz"></i></div>
                        <span>Premium</span>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
