<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FemWay - My Profile</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="iphone-13">
        <div class="notch"></div>

        <header class="profile-header">
            <h1>My Profile</h1>
            <div class="user-card slide-up">
                <div class="user-main">
                    <img src="images/sarah.png" alt="Sarah Johnson" class="profile-img">
                    <div class="user-details">
                        <h2>Sarah Mohammed</h2>
                        <p>sarahmoj@gmail.com</p>
                        <p>+201123917394</p>
                    </div>
                    <button class="btn-edit">Edit</button>
                </div>
            </div>
        </header>

        <main class="profile-content">
            <div class="menu-list">
                <div class="menu-item slide-up" style="--delay: 0.1s">
                    <div class="item-left">
                        <div class="icon-box soft-pink"><i class="ph ph-globe"></i></div>
                        <span>Language</span>
                    </div>
                    <div class="item-right">
                        <span class="sub-text">English</span>
                        <i class="ph ph-caret-right"></i>
                    </div>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.2s">
                    <div class="item-left">
                        <div class="icon-box soft-blue"><i class="ph ph-user"></i></div>
                        <span>Personal Information</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.3s">
                    <div class="item-left">
                        <div class="icon-box soft-green"><i class="ph ph-credit-card"></i></div>
                        <span>Payment Methods</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.4s">
                    <div class="item-left">
                        <div class="icon-box soft-red"><i class="ph ph-shield-check"></i></div>
                        <span>Emergency Contacts</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.5s">
                    <div class="item-left">
                        <div class="icon-box soft-purple"><i class="ph ph-bell"></i></div>
                        <span>Notifications</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.6s">
                    <div class="item-left">
                        <div class="icon-box soft-gray"><i class="ph ph-gear"></i></div>
                        <span>Settings</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>

                <div class="menu-item slide-up" style="--delay: 0.7s">
                    <div class="item-left">
                        <div class="icon-box soft-orange"><i class="ph ph-question"></i></div>
                        <span>Help & Support</span>
                    </div>
                    <i class="ph ph-caret-right"></i>
                </div>
            </div>

            <button class="btn-logout slide-up" style="--delay: 0.8s">
                <i class="ph ph-sign-out"></i>
                <span>Logout</span>
            </button>
        </main>

        <nav class="nav-bar">
         <a href="Home.html">   <div class="nav-item"><i class="ph ph-house"></i><span>Home</span></div> </a>
          <a href="booking.html"> <div class="nav-item"><i class="ph ph-calendar-blank"></i><span>Book</span></div> </a> 
       <div class="nav-item"><i class="ph ph-clock-counter-clockwise"></i><span>Rides</span></div>
        <a href="profile.html">    <div class="nav-item active"><i class="ph-fill ph-user"></i><span>Profile</span></div> </a>
        </nav>
    </div>

    <script src="profile.js"></script>
</body>
</html>
